name: collectd
version: 0.0.1
slug: collectd
description: >-
  Collectd is a daemon which collects system performance statistics periodically and provides mechanisms to store the values in a variety of ways, for example in RRD files.
arch:
  - amd64
  - aarch64
url: https://github.com/codavs65r/ha-addons/collectd
hassio_role: manager
host_dbus: true
image: homeassistant/{arch}-addon-collectd
init: false
ports:
  9103/tcp:
ports_description:
  9103/tcp: microhttpd web server for Prometheus exposition format
map:
  - addons:rw
  - all_addon_configs:rw
  - backup:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:rw
uart: true
startup: services
