name: collectd
version: 0.2.2
slug: collectd
description: >-
  Collectd is a daemon which collects system performance statistics periodically and provides mechanisms to store the values in a variety of ways, for example in RRD files.
arch:
  - amd64
  - aarch64
url: https://github.com/codavs65r/ha-addons/collectd
hassio_role: manager
host_network: true
host_dbus: true
init: false
ports:
  9103/tcp: null
ports_description:
  9103/tcp: microhttpd web server for Prometheus exposition format
map:
  - addons:rw
  - all_addon_configs:rw
  - backup:rw
  - homeassistant_config:rw
  - media:rw
  - share:rw
  - ssl:rw
uart: true
udev: true
startup: services
options:
  hostname: homeassistant
  graphite_host: localhost
  graphite_prefix: collectd
  prometheus_port: 9103
schema:
  hostname: str
  graphite_host: str
  graphite_prefix: str
  prometheus_port: int
